<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goodbye Rohan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080B18; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Cormorant Garamond', serif; }
    
    #c { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
    
    .center { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: opacity 2s ease; }
    .center.gone { opacity: 0; pointer-events: none; }
    
    .word { color: #C8C4BE; font-size: clamp(3rem, 9vw, 7.5rem); font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase; opacity: 0; animation: fadein 2s ease forwards; }
    .rule { width: 0; height: 1px; background: #C4823A; margin: 2.2rem auto; animation: widen 1.5s ease 1s forwards; }
    .status { color: #4A445C; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 300; font-style: italic; opacity: 0; animation: fadein 1.5s ease 1.5s forwards; }
    
    #photoOverlay { position: fixed; inset: 0; z-index: 30; opacity: 0; pointer-events: none; transition: opacity 3.5s ease; }
    #photoOverlay.visible { opacity: 1; }
    #photoOverlay img { width: 100%; height: 100%; object-fit: contain; object-position: center top; display: block; }
    
    .goodbye { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10vh; background: linear-gradient(to top, rgba(8,11,24,0.85) 0%, rgba(8,11,24,0.2) 40%, transparent 65%); }
    .goodbye span { color: #C8C4BE; font-size: clamp(2rem, 6vw, 5rem); font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase; opacity: 0; transition: opacity 3s ease 1s; }
    #photoOverlay.visible .goodbye span { opacity: 1; }

    @keyframes fadein { to { opacity: 1; } }
    @keyframes widen  { to { width: 80px; } }
  </style>
</head>
<body>

  <canvas id="c"></canvas>
  <audio id="player" src="audio.mp3" preload="auto"></audio>

  <div class="center" id="intro">
    <div class="word">Farewell</div>
    <div class="rule"></div>
    <div class="status" id="statusMessage">Preparing...</div>
  </div>

  <div id="photoOverlay">
    <img src="photo.png" alt="Rohan">
    <div class="goodbye"><span>Goodbye Rohan</span></div>
  </div>

  <script>
  (function () {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('player');
    let phase = 'waiting'; // waiting -> raining -> goodbye

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    // --- ANIMATION CLASSES (RAINING DOWN) ---
    class Mote {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = -10;
        this.size = Math.random() * 1.5 + 0.5;
        this.vy = Math.random() * 1.5 + 0.5; // Moving downward
        this.vx = (Math.random() - 0.5) * 0.5;
        this.life = 1;
        this.decay = Math.random() * 0.002 + 0.001;
      }
      update() { this.y += this.vy; this.x += this.vx; this.life -= this.decay; }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 196, 190, ${this.life * 0.6})`; ctx.fill();
      }
      dead() { return this.life <= 0 || this.y > canvas.height + 10; }
    }

    class Cloud {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = -60;
        this.vy = 0.3 + Math.random() * 0.4;
        this.vx = (Math.random() - 0.5) * 0.2;
        this.s = 0.4 + Math.random() * 0.6;
        this.alpha = 0.25;
      }
      update() { this.y += this.vy; this.x += this.vx; }
      draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.translate(this.x, this.y); ctx.scale(this.s, this.s * 0.6);
        ctx.beginPath(); ctx.arc(0,0,42,0,Math.PI*2); ctx.arc(40,-8,31,0,Math.PI*2); ctx.arc(78,0,38,0,Math.PI*2); ctx.arc(54,-30,26,0,Math.PI*2);
        ctx.fillStyle = '#C4C0D4'; ctx.fill(); ctx.restore();
      }
      dead() { return this.y > canvas.height + 100; }
    }

    const TYPES = ['laptop', 'server', 'monitor', 'cable'];
    class ITItem {
      constructor() {
        this.x = Math.random() * canvas.width; this.y = -50;
        this.type = TYPES[Math.floor(Math.random() * TYPES.length)];
        this.vy = 1.2 + Math.random() * 1.5; this.vx = (Math.random() - 0.5) * 0.5;
        this.angle = Math.random() * Math.PI; this.va = (Math.random() - 0.5) * 0.03;
        this.s = 0.7 + Math.random() * 0.5;
      }
      update() { this.y += this.vy; this.x += this.vx; this.angle += this.va; }
      draw() {
        ctx.save(); ctx.globalAlpha = 0.5; ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.scale(this.s, this.s);
        ctx.strokeStyle = '#A89EC0'; ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        switch(this.type) {
          case 'laptop':
            ctx.beginPath(); ctx.rect(-22,-28,44,28); ctx.stroke();
            ctx.beginPath(); ctx.rect(-15,-22,30,18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-26,0); ctx.lineTo(26,0); ctx.lineTo(24,9); ctx.lineTo(-24,9); ctx.closePath(); ctx.stroke(); break;
          case 'server':
            for(let i=0;i<3;i++){ctx.beginPath();ctx.rect(-22,-20+i*16,44,12);ctx.stroke();ctx.beginPath();ctx.arc(14,-14+i*16,3,0,Math.PI*2);ctx.stroke();} break;
          case 'monitor':
            ctx.beginPath(); ctx.rect(-26,-26,52,38); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,12); ctx.lineTo(0,22); ctx.moveTo(-14,22); ctx.lineTo(14,22); ctx.stroke(); break;
          case 'cable':
            ctx.beginPath(); ctx.moveTo(-22,-22); ctx.bezierCurveTo(-6,10,6,-10,22,22); ctx.stroke(); break;
        }
        ctx.restore();
      }
      dead() { return this.y > canvas.height + 60; }
    }

    class Cigarette {
      constructor() {
        this.x = Math.random() * canvas.width; this.y = -40;
        this.vy = 1.5 + Math.random() * 1.5; this.vx = (Math.random() - 0.5) * 0.4;
        this.angle = Math.random() * Math.PI; this.va = (Math.random() - 0.5) * 0.04;
        this.s = 0.8 + Math.random() * 0.6;
      }
      update() { this.y += this.vy; this.x += this.vx; this.angle += this.va; }
      draw() {
        ctx.save(); ctx.globalAlpha = 0.7; ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.scale(this.s, this.s);
        ctx.fillStyle = '#E8E4DC'; ctx.beginPath(); ctx.roundRect(-2,-30,4,40,2); ctx.fill();
        ctx.fillStyle = '#C4823A'; ctx.beginPath(); ctx.roundRect(-2,10,4,12,1); ctx.fill();
        ctx.fillStyle = '#FFA030'; ctx.beginPath(); ctx.arc(0,-31,2,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      dead() { return this.y > canvas.height + 50; }
    }

    const objects = [];

    // --- MAIN LOOP ---
    function tick() {
      requestAnimationFrame(tick);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (phase === 'raining') {
        if (Math.random() < 0.4) objects.push(new Mote());
        if (Math.random() < 0.015) objects.push(new Cloud());
        if (Math.random() < 0.02) objects.push(new ITItem());
        if (Math.random() < 0.02) objects.push(new Cigarette());
      }

      for (let i = objects.length - 1; i >= 0; i--) {
        objects[i].update();
        objects[i].draw();
        if (objects[i].dead()) objects.splice(i, 1);
      }
    }
    tick();

    // --- TIMELINE SEQUENCING ---
    // 1. Initial 3-second wait, then start sequence
    setTimeout(() => {
      phase = 'raining';
      document.getElementById('statusMessage').textContent = "Commencing...";
      
      // Attempt audio playback. 
      // Note: Browsers may block audio until the user interacts with the page.
      // If blocked, the loop catches the error and the visuals still process perfectly!
      audio.play().catch(err => {
        console.warn("Audio autoplay blocked by browser permissions, continuing with visual sequence.");
        document.getElementById('statusMessage').textContent = "Click anywhere to enable audio";
        window.addEventListener('click', () => { audio.play(); }, { once: true });
      });

      // 2. Rain items for 10 seconds, then transition to final goodbye image
      setTimeout(showGoodbye, 10000);

    }, 3000);

    function showGoodbye() {
      if (phase === 'goodbye') return;
      phase = 'goodbye';
      document.getElementById('intro').classList.add('gone');
      document.getElementById('photoOverlay').classList.add('visible');
    }
  })();
  </script>
</body>
</html>
